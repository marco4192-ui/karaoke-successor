name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.1'
      build_windows:
        description: 'Build Windows executable'
        required: true
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS executable'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux executable'
        required: true
        default: true
        type: boolean
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  BUN_VERSION: 'latest'
  NODE_VERSION: '22.14.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_VERSION: '2'
jobs:
  # Build Windows MSI/NSIS Installer
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    if: ${{ github.event.inputs.build_windows != 'false' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify toolchain
        shell: pwsh
        run: |
          Write-Host "=== Verifying build toolchain ==="
          Write-Host "Node.js: $(node --version)"
          Write-Host "Bun: $(bun --version)"
          Write-Host "Rust: $(rustc --version)"
          Write-Host "Cargo: $(cargo --version)"
          Write-Host "MSVC cl.exe:"; cl.exe 2>&1 | Select-Object -First 1

          # Verify cargo-tauri (will be installed by tauri-action if missing)
          if (-not (Get-Command cargo-tauri -ErrorAction SilentlyContinue)) {
            Write-Host "Installing tauri-cli via cargo..."
            cargo install tauri-cli --version "^2" --locked
          }
          Write-Host "Tauri CLI: $(cargo tauri --version)"
          Write-Host "=== Toolchain verified ==="

      - name: Build Next.js standalone
        run: |
          bun run next build --webpack
          if (-not (Test-Path ".next\standalone")) {
            Write-Error "Standalone build failed!"
            exit 1
          }
          Write-Host "Standalone build successful!"
          Get-ChildItem ".next\standalone" -Recurse | Where-Object { -not $_.PSIsContainer } | Measure-Object | Select-Object -ExpandProperty Count

      - name: Download Node.js portable
        shell: pwsh
        run: |
          Write-Host "Downloading Node.js v${{ env.NODE_VERSION }}..."
          $nodeUrl = "https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-win-x64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile "node.zip" -TimeoutSec 300
          Expand-Archive -Path "node.zip" -DestinationPath "." -Force
          Write-Host "Node.js downloaded and extracted"

      - name: Prepare bundled files for Tauri
        shell: pwsh
        run: |
          Write-Host "Creating bundled directories..."
          New-Item -ItemType Directory -Force -Path "src-tauri\bundled\server"
          New-Item -ItemType Directory -Force -Path "src-tauri\bundled\node"

          # Copy only node.exe (self-contained, ~80MB) — skip npm, corepack, docs, etc.
          Write-Host "Copying node.exe only (minimal runtime)..."
          Copy-Item -Force "node-v${{ env.NODE_VERSION }}-win-x64\node.exe" "src-tauri\bundled\node\node.exe"

          # Copy Next.js standalone server
          Write-Host "Copying Next.js standalone server..."
          Copy-Item -Recurse -Force ".next\standalone\*" "src-tauri\bundled\server\"

          # Copy static files
          Write-Host "Copying static files..."
          New-Item -ItemType Directory -Force -Path "src-tauri\bundled\server\.next\static"
          Copy-Item -Recurse -Force ".next\static\*" "src-tauri\bundled\server\.next\static\"

          # Copy public folder
          Write-Host "Copying public folder..."
          if (Test-Path "public") {
            Copy-Item -Recurse -Force "public" "src-tauri\bundled\server\"
          }

          # Summary
          Write-Host "`n=== Bundled files summary ==="
          $totalFiles = (Get-ChildItem "src-tauri\bundled" -Recurse | Where-Object { -not $_.PSIsContainer }).Count
          $totalSize = (Get-ChildItem "src-tauri\bundled" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Total: $totalFiles files, $([math]::Round($totalSize, 2)) MB"

      - name: Pre-build Rust code
        shell: pwsh
        working-directory: src-tauri
        run: |
          Write-Host "Pre-compiling Rust code (without devtools, with crepe)..."
          cargo build --release --no-default-features --features crepe 2>&1 | ForEach-Object { Write-Host $_ }
          Write-Host "Pre-build complete."

      - name: Download ONNX Runtime DLL
        shell: pwsh
        run: |
          Write-Host "=== Downloading ONNX Runtime 1.24.4 (ort-sys 2.0.0-rc.12 compatible) ==="
          New-Item -ItemType Directory -Force -Path "src-tauri\bundled\native" | Out-Null
          $ortVersion = "1.24.4"
          $ortUrl = "https://github.com/microsoft/onnxruntime/releases/download/v$ortVersion/onnxruntime-win-x64-$ortVersion.zip"
          $ortZip = "onnxruntime.zip"
          Write-Host "Downloading from: $ortUrl"
          Invoke-WebRequest -Uri $ortUrl -OutFile $ortZip -TimeoutSec 300
          Expand-Archive -Path $ortZip -DestinationPath "onnxruntime-extracted" -Force
          # Copy onnxruntime.dll from the lib/ directory
          $ortLibDir = "onnxruntime-extracted\onnxruntime-win-x64-$ortVersion\lib"
          if (Test-Path "$ortLibDir\onnxruntime.dll") {
            Copy-Item "$ortLibDir\onnxruntime.dll" "src-tauri\bundled\native\onnxruntime.dll" -Force
            Write-Host ("  Copied onnxruntime.dll ({0:N2} MB)" -f ((Get-Item "$ortLibDir\onnxruntime.dll").Length / 1MB))
          } else {
            Write-Error "onnxruntime.dll not found in extracted archive at $ortLibDir"
            exit 1
          }
          # Copy providers DLL if present
          $providersDlls = @("onnxruntime_providers_shared.dll", "onnxruntime_providers_cuda.dll")
          foreach ($pDll in $providersDlls) {
            if (Test-Path "$ortLibDir\$pDll") {
              Copy-Item "$ortLibDir\$pDll" "src-tauri\bundled\native\$pDll" -Force
              Write-Host ("  Copied {0} ({1:N2} MB)" -f $pDll, ((Get-Item "$ortLibDir\$pDll").Length / 1MB))
            }
          }
          # Cleanup
          Remove-Item -Recurse -Force $ortZip, "onnxruntime-extracted" -ErrorAction SilentlyContinue
          Write-Host "ONNX Runtime download complete."

      - name: Bundle VC++ Runtime DLLs
        shell: pwsh
        run: |
          Write-Host "=== Bundling VC++ Runtime DLLs ==="
          $copied = 0
          # Strategy 1: vswithout strict -requires filter
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $msvcPath = & $vswhere -latest -property installationPath 2>$null
            if ($msvcPath) {
              Write-Host "  Found VS at: $msvcPath"
              $redistDir = Get-ChildItem "$msvcPath\VC\Redist\MSVC" -Directory -ErrorAction SilentlyContinue |
                Sort-Object -Descending | Select-Object -First 1
              if ($redistDir) {
                $crtDir = Join-Path $redistDir.FullName "x64\Microsoft.VC143.CRT"
                if (Test-Path $crtDir) {
                  foreach ($dll in @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")) {
                    $src = Join-Path $crtDir $dll
                    if (Test-Path $src) {
                      Copy-Item $src "src-tauri\bundled\native\$dll" -Force
                      Write-Host "  Copied from VS Redist: $dll"
                      $copied++
                    }
                  }
                }
              }
            }
          }
          # Strategy 2: Fallback - copy from Windows System32 (always available on runners)
          if ($copied -lt 3) {
            Write-Host "  Falling back to System32..."
            foreach ($dll in @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")) {
              $dest = "src-tauri\bundled\native\$dll"
              if (-not (Test-Path $dest)) {
                $sys32 = Join-Path $env:SystemRoot "System32\$dll"
                if (Test-Path $sys32) {
                  Copy-Item $sys32 $dest -Force
                  Write-Host "  Copied from System32: $dll"
                  $copied++
                }
              }
            }
          }
          if ($copied -lt 3) {
            Write-Error "Could not find all VC++ Runtime DLLs (copied $copied/3)"
            exit 1
          }

      - name: Verify all required native DLLs
        shell: pwsh
        run: |
          Write-Host "=== Verifying bundled native DLLs ==="
          $requiredDlls = @(
            @{Name="onnxruntime.dll"; MinMB=5},
            @{Name="msvcp140.dll"; MinMB=0.01},
            @{Name="vcruntime140.dll"; MinMB=0.01},
            @{Name="vcruntime140_1.dll"; MinMB=0.01}
          )
          $missingDlls = @()
          foreach ($item in $requiredDlls) {
            $dllPath = "src-tauri\bundled\native\$($item.Name)"
            if (Test-Path $dllPath) {
              $sizeMB = (Get-Item $dllPath).Length / 1MB
              if ($sizeMB -ge $item.MinMB) {
                Write-Host ("  OK: {0} ({1:N2} MB)" -f $item.Name, $sizeMB)
              } else {
                Write-Error ("  WRONG SIZE: {0} is only {1:N2} MB (expected >= {2} MB)" -f $item.Name, $sizeMB, $item.MinMB)
                $missingDlls += $item.Name
              }
            } else {
              Write-Error "  MISSING: $($item.Name)"
              $missingDlls += $item.Name
            }
          }
          if ($missingDlls.Count -gt 0) {
            Write-Error ("Missing/invalid DLLs: {0}" -f ($missingDlls -join ', '))
            exit 1
          }
          Write-Host ""
          Write-Host "=== Native DLLs summary ==="
          Get-ChildItem "src-tauri\bundled\native" -Filter "*.dll" | ForEach-Object {
            Write-Host ("  {0} ({1:N2} MB)" -f $_.Name, ($_.Length / 1MB))
          }

      - name: Create launcher script
        shell: pwsh
        run: |
          $launcherScript = @"
          @echo off
          cd /d "%~dp0"
          set PORT=3000
          set HOSTNAME=0.0.0.0
          start "" "..\node\node.exe" "server.js"
          timeout /t 3 /nobreak >nul
          start http://localhost:3000
          "@
          Set-Content -Path "src-tauri\bundled\server\start-server.bat" -Value $launcherScript -Encoding ASCII
          Write-Host "Created start-server.bat"

      - name: Free disk space before Tauri build
        shell: pwsh
        run: |
          Write-Host "Freeing disk space..."
          Remove-Item -Recurse -Force "node.zip" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "node-v${{ env.NODE_VERSION }}-win-x64" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:LOCALAPPDATA\bun\install\cache\" -ErrorAction SilentlyContinue
          $drive = Get-PSDrive -Name C
          Write-Host "Free space on C: $([math]::Round($drive.Free / 1GB, 2)) GB"

      - name: Ensure dist folder
        run: New-Item -ItemType Directory -Force -Path "dist"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'Karaoke Successor ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            # 🎤 Karaoke Successor

            **Fully standalone installer - no additional downloads required!**
            Includes Node.js runtime and Microsoft Visual C++ Redistributable.

            ## 📥 Installation (Windows)
            1. Download the `.exe` installer
            2. Run the installer (no admin rights needed)
            3. Launch "Karaoke ZERO" from Start Menu
            4. Enjoy! 🎤

            ## ✨ Features
            - Real-time pitch detection (YIN algorithm)
            - 3 difficulty levels
            - Party modes (Pass the Mic, Duel, Medley)
            - Mobile companion app (use phone as microphone)
            - Song import (UltraStar, MIDI, SingStar formats)
            - Highscores with ranking titles
            - Achievements system
            - Multiple color themes

            ## 🖥️ System Requirements
            - Windows 10/11 (64-bit)
            - 4GB RAM minimum
            - Microphone (optional, for singing)
            - No need to install Node.js, Bun, or Visual C++ Runtime
          releaseDraft: ${{ github.event.inputs.create_release != 'false' }}
          prerelease: false
          args: --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-executables
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: warn

  # Build macOS DMG/App
  build-macos:
    name: Build macOS Executable
    runs-on: macos-latest
    if: ${{ github.event.inputs.build_macos != 'false' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify toolchain
        run: |
          echo "=== Verifying build toolchain ==="
          echo "Node.js: $(node --version)"
          echo "Bun: $(bun --version)"
          echo "Rust: $(rustc --version)"
          echo "Cargo: $(cargo --version)"
          echo "Xcode CLT:"
          xcode-select -p
          echo "Clang: $(clang --version 2>&1 | head -1)"

          # Verify cargo-tauri (will be installed by tauri-action if missing)
          if ! command -v cargo-tauri &> /dev/null; then
            echo "Installing tauri-cli via cargo..."
            cargo install tauri-cli --version "^2" --locked
          fi
          echo "Tauri CLI: $(cargo tauri --version)"
          echo "=== Toolchain verified ==="

      - name: Build Next.js standalone
        run: bun run next build --webpack

      - name: Download Node.js portable (macOS)
        run: |
          # Download for Intel and Apple Silicon
          echo "Downloading Node.js for macOS Intel..."
          curl -sL https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-darwin-x64.tar.gz | tar xz
          mv node-v${{ env.NODE_VERSION }}-darwin-x64 node-darwin-x64

          echo "Downloading Node.js for macOS Apple Silicon..."
          curl -sL https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-darwin-arm64.tar.gz | tar xz
          mv node-v${{ env.NODE_VERSION }}-darwin-arm64 node-darwin-arm64

      - name: Prepare bundled files
        run: |
          mkdir -p src-tauri/bundled/server
          mkdir -p src-tauri/bundled/node

          # Copy Next.js standalone
          echo "Copying Next.js standalone..."
          cp -r .next/standalone/* src-tauri/bundled/server/
          mkdir -p src-tauri/bundled/server/.next/static
          cp -r .next/static/* src-tauri/bundled/server/.next/static/
          cp -r public src-tauri/bundled/server/ 2>/dev/null || true

          # Copy Node.js (Intel version as default)
          echo "Copying Node.js runtime..."
          cp -r node-darwin-x64/* src-tauri/bundled/node/
          chmod +x src-tauri/bundled/node/bin/node

          # Summary
          echo "=== Bundled files summary ==="
          du -sh src-tauri/bundled/*

      - name: Ensure dist folder
        run: mkdir -p dist

      - name: Build Tauri app (Universal Binary)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'Karaoke Successor ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            # 🎤 Karaoke Successor (macOS)

            **Fully standalone - no Node.js installation required!**

            ## 📥 Installation (macOS)
            1. Download the `.dmg` file
            2. Open the DMG and drag to Applications
            3. Launch "Karaoke Successor"
            4. Enjoy! 🎤

            ## ✨ Features
            - Real-time pitch detection (YIN algorithm)
            - 3 difficulty levels
            - Party modes
            - Mobile companion app
            - Song import
            - Achievements system

            ## 🖥️ System Requirements
            - macOS 10.15 (Catalina) or later
            - 4GB RAM minimum
            - Microphone (optional)
          releaseDraft: ${{ github.event.inputs.create_release != 'false' }}
          prerelease: false
          args: --target universal-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-executables
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          retention-days: 30
          if-no-files-found: warn

  # Build Linux DEB/AppImage
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.build_linux != 'false' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libfuse2 \
            fuse \
            squashfs-tools \
            file \
            desktop-file-utils \
            appstream \
            libasound2-dev \
            libpulse-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify toolchain
        run: |
          echo "=== Verifying build toolchain ==="
          echo "Node.js: $(node --version)"
          echo "Bun: $(bun --version)"
          echo "Rust: $(rustc --version)"
          echo "Cargo: $(cargo --version)"
          echo "GCC: $(gcc --version | head -1)"
          echo "PKG-Config: $(pkg-config --version)"

          # Verify cargo-tauri (will be installed by tauri-action if missing)
          if ! command -v cargo-tauri &> /dev/null; then
            echo "Installing tauri-cli via cargo..."
            cargo install tauri-cli --version "^2" --locked
          fi
          echo "Tauri CLI: $(cargo tauri --version)"
          echo "=== Toolchain verified ==="

      - name: Build Next.js standalone
        run: bun run next build --webpack

      - name: Download Node.js portable (Linux)
        run: |
          echo "Downloading Node.js for Linux..."
          curl -sL https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-linux-x64.tar.xz | tar xJ
          mv node-v${{ env.NODE_VERSION }}-linux-x64 node-linux-x64

      - name: Prepare bundled files
        run: |
          mkdir -p src-tauri/bundled/server
          mkdir -p src-tauri/bundled/node

          # Copy Next.js standalone
          echo "Copying Next.js standalone..."
          cp -r .next/standalone/* src-tauri/bundled/server/
          mkdir -p src-tauri/bundled/server/.next/static
          cp -r .next/static/* src-tauri/bundled/server/.next/static/
          cp -r public src-tauri/bundled/server/ 2>/dev/null || true

          # Copy Node.js
          echo "Copying Node.js runtime..."
          cp -r node-linux-x64/* src-tauri/bundled/node/
          chmod +x src-tauri/bundled/node/bin/node

          # Summary
          echo "=== Bundled files summary ==="
          du -sh src-tauri/bundled/*

      - name: Ensure dist folder
        run: mkdir -p dist

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'Karaoke Successor ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            # 🎤 Karaoke Successor (Linux)

            **Fully standalone - no Node.js installation required!**

            ## 📥 Installation (Linux)
            1. Download the `.deb` file
            2. Install: `sudo dpkg -i karaoke-successor_*.deb`
            3. Or use: `sudo apt install ./karaoke-successor_*.deb`
            4. Launch "Karaoke Successor" from your app menu
            5. Enjoy! 🎤

            ## ✨ Features
            - Real-time pitch detection (YIN algorithm)
            - 3 difficulty levels
            - Party modes
            - Mobile companion app
            - Song import
            - Achievements system

            ## 🖥️ System Requirements
            - Ubuntu 20.04+ or compatible distribution
            - 4GB RAM minimum
            - Microphone (optional)
          releaseDraft: ${{ github.event.inputs.create_release != 'false' }}
          prerelease: false
          args: --bundles deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-executables
          path: |
            src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30
          if-no-files-found: warn

  # Summary job that runs after all builds complete
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: always()
    steps:
      - name: Check build results
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ${{ needs.build-windows.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | ${{ needs.build-macos.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | ${{ needs.build-linux.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: all-artifacts
        continue-on-error: true

      - name: List all artifacts
        run: |
          echo "## 📦 Artifacts Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "all-artifacts" ]; then
            find all-artifacts -type f -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" 2>/dev/null | while read file; do
              size=$(du -h "$file" | cut -f1)
              echo "- \`$(basename "$file")\` ($size)" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No artifacts found" >> $GITHUB_STEP_SUMMARY
          fi
