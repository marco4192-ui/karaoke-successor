name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.1'
      build_windows:
        description: 'Build Windows executable'
        required: true
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS executable'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux executable'
        required: true
        default: true
        type: boolean
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  BUN_VERSION: 'latest'
  NODE_VERSION: '22.14.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_VERSION: '2'
jobs:
  # Build Windows MSI/NSIS Installer
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    if: ${{ github.event.inputs.build_windows != 'false' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js standalone
        run: |
          bun run next build
          if (-not (Test-Path ".next\standalone")) {
            Write-Error "Standalone build failed!"
            exit 1
          }
          Write-Host "Standalone build successful!"
          Get-ChildItem ".next\standalone" -Recurse | Where-Object { -not $_.PSIsContainer } | Measure-Object | Select-Object -ExpandProperty Count

      - name: Download Node.js portable
        shell: pwsh
        run: |
          Write-Host "Downloading Node.js v${{ env.NODE_VERSION }}..."
          $nodeUrl = "https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-win-x64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile "node.zip" -TimeoutSec 300
          Expand-Archive -Path "node.zip" -DestinationPath "." -Force
          Write-Host "Node.js downloaded and extracted"

      - name: Prepare bundled files for Tauri
        shell: pwsh
        run: |
          Write-Host "Creating bundled directories..."
          New-Item -ItemType Directory -Force -Path "src-tauri\bundled\server"
          New-Item -ItemType Directory -Force -Path "src-tauri\bundled\node"

          # Copy Node.js runtime
          Write-Host "Copying Node.js runtime..."
          Copy-Item -Recurse -Force "node-v${{ env.NODE_VERSION }}-win-x64\*" "src-tauri\bundled\node\"

          # Copy Next.js standalone server
          Write-Host "Copying Next.js standalone server..."
          Copy-Item -Recurse -Force ".next\standalone\*" "src-tauri\bundled\server\"

          # Copy static files
          Write-Host "Copying static files..."
          New-Item -ItemType Directory -Force -Path "src-tauri\bundled\server\.next\static"
          Copy-Item -Recurse -Force ".next\static\*" "src-tauri\bundled\server\.next\static\"

          # Copy public folder
          Write-Host "Copying public folder..."
          if (Test-Path "public") {
            Copy-Item -Recurse -Force "public" "src-tauri\bundled\server\"
          }

          # Summary
          Write-Host "`n=== Bundled files summary ==="
          $totalFiles = (Get-ChildItem "src-tauri\bundled" -Recurse | Where-Object { -not $_.PSIsContainer }).Count
          $totalSize = (Get-ChildItem "src-tauri\bundled" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Total: $totalFiles files, $([math]::Round($totalSize, 2)) MB"

      - name: Create launcher script
        shell: pwsh
        run: |
          $launcherScript = @"
          @echo off
          cd /d "%~dp0"
          set PORT=3000
          set HOSTNAME=0.0.0.0
          start "" "..\node\node.exe" "server.js"
          timeout /t 3 /nobreak >nul
          start http://localhost:3000
          "@
          Set-Content -Path "src-tauri\bundled\server\start-server.bat" -Value $launcherScript -Encoding ASCII
          Write-Host "Created start-server.bat"

      - name: Ensure dist folder
        run: New-Item -ItemType Directory -Force -Path "dist"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'Karaoke Successor ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            # 🎤 Karaoke Successor

            **Fully standalone - no Node.js installation required!**

            ## 📥 Installation (Windows)
            1. Download the `.exe` installer
            2. Run the installer
            3. Launch "Karaoke Successor" from Start Menu
            4. Enjoy! 🎤

            ## ✨ Features
            - Real-time pitch detection (YIN algorithm)
            - 3 difficulty levels
            - Party modes (Pass the Mic, Duel, Medley)
            - Mobile companion app (use phone as microphone)
            - Song import (UltraStar, MIDI, SingStar formats)
            - Highscores with ranking titles
            - Achievements system
            - Multiple color themes

            ## 🖥️ System Requirements
            - Windows 10/11 (64-bit)
            - 4GB RAM minimum
            - Microphone (optional, for singing)
          releaseDraft: ${{ github.event.inputs.create_release != 'false' }}
          prerelease: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-executables
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
          if-no-files-found: warn

  # Build macOS DMG/App
  build-macos:
    name: Build macOS Executable
    runs-on: macos-latest
    if: ${{ github.event.inputs.build_macos != 'false' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js standalone
        run: bun run next build

      - name: Download Node.js portable (macOS)
        run: |
          # Download for Intel and Apple Silicon
          echo "Downloading Node.js for macOS Intel..."
          curl -sL https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-darwin-x64.tar.gz | tar xz
          mv node-v${{ env.NODE_VERSION }}-darwin-x64 node-darwin-x64

          echo "Downloading Node.js for macOS Apple Silicon..."
          curl -sL https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-darwin-arm64.tar.gz | tar xz
          mv node-v${{ env.NODE_VERSION }}-darwin-arm64 node-darwin-arm64

      - name: Prepare bundled files
        run: |
          mkdir -p src-tauri/bundled/server
          mkdir -p src-tauri/bundled/node

          # Copy Next.js standalone
          echo "Copying Next.js standalone..."
          cp -r .next/standalone/* src-tauri/bundled/server/
          mkdir -p src-tauri/bundled/server/.next/static
          cp -r .next/static/* src-tauri/bundled/server/.next/static/
          cp -r public src-tauri/bundled/server/ 2>/dev/null || true

          # Copy Node.js (Intel version as default)
          echo "Copying Node.js runtime..."
          cp -r node-darwin-x64/* src-tauri/bundled/node/
          chmod +x src-tauri/bundled/node/bin/node

          # Summary
          echo "=== Bundled files summary ==="
          du -sh src-tauri/bundled/*

      - name: Ensure dist folder
        run: mkdir -p dist

      - name: Build Tauri app (Universal Binary)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'Karaoke Successor ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            # 🎤 Karaoke Successor (macOS)

            **Fully standalone - no Node.js installation required!**

            ## 📥 Installation (macOS)
            1. Download the `.dmg` file
            2. Open the DMG and drag to Applications
            3. Launch "Karaoke Successor"
            4. Enjoy! 🎤

            ## ✨ Features
            - Real-time pitch detection (YIN algorithm)
            - 3 difficulty levels
            - Party modes
            - Mobile companion app
            - Song import
            - Achievements system

            ## 🖥️ System Requirements
            - macOS 10.15 (Catalina) or later
            - 4GB RAM minimum
            - Microphone (optional)
          releaseDraft: ${{ github.event.inputs.create_release != 'false' }}
          prerelease: false
          args: --target universal-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-executables
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          retention-days: 30
          if-no-files-found: warn

  # Build Linux DEB/AppImage
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.build_linux != 'false' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libfuse2 \
            fuse \
            squashfs-tools \
            file \
            desktop-file-utils \
            appstream \
            libasound2-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js standalone
        run: bun run next build

      - name: Download Node.js portable (Linux)
        run: |
          echo "Downloading Node.js for Linux..."
          curl -sL https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-linux-x64.tar.xz | tar xJ
          mv node-v${{ env.NODE_VERSION }}-linux-x64 node-linux-x64

      - name: Prepare bundled files
        run: |
          mkdir -p src-tauri/bundled/server
          mkdir -p src-tauri/bundled/node

          # Copy Next.js standalone
          echo "Copying Next.js standalone..."
          cp -r .next/standalone/* src-tauri/bundled/server/
          mkdir -p src-tauri/bundled/server/.next/static
          cp -r .next/static/* src-tauri/bundled/server/.next/static/
          cp -r public src-tauri/bundled/server/ 2>/dev/null || true

          # Copy Node.js
          echo "Copying Node.js runtime..."
          cp -r node-linux-x64/* src-tauri/bundled/node/
          chmod +x src-tauri/bundled/node/bin/node

          # Summary
          echo "=== Bundled files summary ==="
          du -sh src-tauri/bundled/*

      - name: Ensure dist folder
        run: mkdir -p dist

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'Karaoke Successor ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            # 🎤 Karaoke Successor (Linux)

            **Fully standalone - no Node.js installation required!**

            ## 📥 Installation (Linux)
            1. Download the `.deb` file
            2. Install: `sudo dpkg -i karaoke-successor_*.deb`
            3. Or use: `sudo apt install ./karaoke-successor_*.deb`
            4. Launch "Karaoke Successor" from your app menu
            5. Enjoy! 🎤

            ## ✨ Features
            - Real-time pitch detection (YIN algorithm)
            - 3 difficulty levels
            - Party modes
            - Mobile companion app
            - Song import
            - Achievements system

            ## 🖥️ System Requirements
            - Ubuntu 20.04+ or compatible distribution
            - 4GB RAM minimum
            - Microphone (optional)
          releaseDraft: ${{ github.event.inputs.create_release != 'false' }}
          prerelease: false
          args: --bundles deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-executables
          path: |
            src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30
          if-no-files-found: warn

  # Summary job that runs after all builds complete
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: always()
    steps:
      - name: Check build results
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ${{ needs.build-windows.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | ${{ needs.build-macos.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | ${{ needs.build-linux.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: all-artifacts
        continue-on-error: true

      - name: List all artifacts
        run: |
          echo "## 📦 Artifacts Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "all-artifacts" ]; then
            find all-artifacts -type f -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" 2>/dev/null | while read file; do
              size=$(du -h "$file" | cut -f1)
              echo "- \`$(basename "$file")\` ($size)" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No artifacts found" >> $GITHUB_STEP_SUMMARY
          fi
