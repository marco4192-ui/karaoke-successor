<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#00aaff"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Microphone body -->
  <ellipse cx="256" cy="200" rx="70" ry="90" fill="url(#cyanGrad)"/>
  <rect x="226" y="200" width="60" height="20" fill="url(#cyanGrad)"/>
  
  <!-- Microphone grill lines -->
  <line x1="210" y1="150" x2="302" y2="150" stroke="#0a0a1a" stroke-width="4"/>
  <line x1="205" y1="170" x2="307" y2="170" stroke="#0a0a1a" stroke-width="4"/>
  <line x1="203" y1="190" x2="309" y2="190" stroke="#0a0a1a" stroke-width="4"/>
  <line x1="203" y1="210" x2="309" y2="210" stroke="#0a0a1a" stroke-width="4"/>
  <line x1="205" y1="230" x2="307" y2="230" stroke="#0a0a1a" stroke-width="4"/>
  <line x1="210" y1="250" x2="302" y2="250" stroke="#0a0a1a" stroke-width="4"/>
  
  <!-- Microphone handle -->
  <rect x="236" y="270" width="40" height="80" rx="10" fill="#333"/>
  <rect x="246" y="350" width="20" height="40" rx="5" fill="#333"/>
  
  <!-- Musical notes -->
  <g fill="url(#purpleGrad)">
    <!-- Note 1 -->
    <circle cx="150" cy="320" r="20"/>
    <rect x="165" y="230" width="8" height="90"/>
    <path d="M165 230 Q200 210 173 180"/>
    
    <!-- Note 2 -->
    <circle cx="362" cy="340" r="20"/>
    <rect x="377" y="250" width="8" height="90"/>
    <path d="M377 250 Q420 220 385 190"/>
  </g>
  
  <!-- Sound waves -->
  <g fill="none" stroke="url(#cyanGrad)" stroke-width="4" stroke-linecap="round">
    <path d="M100 200 Q80 200 80 180 Q80 160 100 160" opacity="0.5"/>
    <path d="M80 210 Q50 210 50 180 Q50 150 80 150" opacity="0.3"/>
    
    <path d="M412 200 Q432 200 432 180 Q432 160 412 160" opacity="0.5"/>
    <path d="M432 210 Q462 210 462 180 Q462 150 432 150" opacity="0.3"/>
  </g>
  
  <!-- Stars/Sparkles -->
  <g fill="#ffffff" opacity="0.8">
    <polygon points="120,100 125,115 140,115 128,125 133,140 120,130 107,140 112,125 100,115 115,115"/>
    <polygon points="392,90 396,102 408,102 398,110 402,122 392,114 382,122 386,110 376,102 388,102" transform="scale(0.7) translate(170, 50)"/>
    <polygon points="180,380 183,388 192,388 185,394 188,402 180,396 172,402 175,394 168,388 177,388" transform="scale(0.8)"/>
  </g>
</svg>
